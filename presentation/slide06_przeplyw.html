<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Animowany przepływ danych end-to-end</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
<link href="theme.css" rel="stylesheet">
<style>
    .wrap { display: flex; flex-direction: column; gap: 10px; height: 100%; min-height: 0; }
    .diagram { flex: 1; min-height: 0; border-radius: 14px; padding: 8px 14px; background: var(--panel-bg); border: 1px solid var(--green-border); display: flex; align-items: center; }
    .diagram svg { width: 100%; height: 100%; display: block; }

    .flow-path { stroke: url(#flowgrad); stroke-width: 2.6; fill: none; stroke-dasharray: 6 8; animation: dashmove 0.8s linear infinite; filter: drop-shadow(0 0 3px rgba(126,186,66,0.5)); }
    @keyframes dashmove { to { stroke-dashoffset: -28; } }

    /* sequential node entrance */
    .gnode { animation: nodeIn 0.55s cubic-bezier(.2,.75,.3,1) both; transform-box: fill-box; transform-origin: center; }
    @keyframes nodeIn { from { opacity: 0; transform: translateY(12px) scale(0.92); } to { opacity: 1; transform: none; } }

    .gnode rect, .gnode polygon { transition: fill 0.3s ease, stroke 0.3s ease; }
    .gnode:hover rect { fill: rgba(126,186,66,0.30); stroke: #9ad94f; }

    /* core nodes get a living glow */
    .gnode--core rect { animation: corePulse 2.6s ease-in-out infinite; }
    @keyframes corePulse {
        0%, 100% { stroke: rgba(126,186,66,0.45); filter: drop-shadow(0 0 0 rgba(154,217,79,0)); }
        50% { stroke: #9ad94f; filter: drop-shadow(0 0 7px rgba(154,217,79,0.75)); }
    }

    .n-title { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; fill: #eef2f8; }
    .n-sub { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; fill: #9fb0c9; }
    .gate-label { font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700; fill: #16210a; }
    .edge-label { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; fill: #c9e7a6; }

    /* travelling triangles (data packets) */
    .tri { fill: #c8f59a; filter: drop-shadow(0 0 6px rgba(154,217,79,0.9)); }
    .tri-amber { fill: #ffd9a0; filter: drop-shadow(0 0 6px rgba(240,184,112,0.9)); }

</style>
<link href="slides-rwd.css" rel="stylesheet">
</head>
<body>
<div class="slide-viewport"><div class="slide-scale-wrap"><div class="slide-scale-inner">
<div class="slide-container">
<div class="stage">
    <div class="s-header">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-diagram-project"></i></div>
            <div>
                <div class="case-label">Dział: Architektura · 2/2</div>
                <div class="logo-text">Przepływ danych end-to-end</div>
                <div class="logo-subtitle">Od zgłoszenia, przez bramę decyzyjną 1000 PLN, po archiwum i analitykę</div>
            </div>
        </div>
        <div class="header-right">
            <span class="section-pill">08 / 18</span>
            <span class="status-badge"><i class="fas fa-bolt"></i> Event-driven</span>
            <div class="brand-chip"><span class="brand-mark"><i class="fas fa-gift"></i></span><span class="brand-word">Gift<span>Flow</span></span></div>
        </div>
    </div>

    <div class="s-body">
    <div class="wrap">
        <div class="diagram">
            <svg viewBox="0 0 1200 470" preserveAspectRatio="xMidYMid meet" role="img" xmlns="http://www.w3.org/2000/svg">
                <title>Animowany diagram blokowy przepływu danych w architekturze Azure</title>
                <defs>
                    <linearGradient id="flowgrad" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0" stop-color="#7eba42"/><stop offset="1" stop-color="#9ad94f"/>
                    </linearGradient>
                    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
                        <path d="M0,0 L6,3 L0,6 Z" fill="#9ad94f"/>
                    </marker>
                </defs>

                <!-- ===== connectors (drawn first, under nodes) ===== -->
                <!-- spine -->
                <path id="p1" class="flow-path" d="M158,96 H196" marker-end="url(#arr)"/>
                <path id="p2" class="flow-path" d="M364,96 H402" marker-end="url(#arr)"/>
                <path id="p3" class="flow-path" d="M578,96 H612" marker-end="url(#arr)"/>
                <path id="p4" class="flow-path" d="M668,96 H700" marker-end="url(#arr)"/>
                <path id="p5" class="flow-path" d="M850,96 H888" marker-end="url(#arr)"/>
                <!-- persistence + analytics -->
                <path id="p6" class="flow-path" d="M490,118 V270" marker-end="url(#arr)"/>
                <path id="p7" class="flow-path" d="M565,296 H605" marker-end="url(#arr)"/>
                <path id="p8" class="flow-path" d="M755,296 H795" marker-end="url(#arr)"/>
                <path id="p9" class="flow-path" d="M945,296 H985" marker-end="url(#arr)"/>

                <!-- ===== travelling triangles (data packets, oriented along path) ===== -->
                <path class="tri" d="M-5,-4 L6,0 L-5,4 Z"><animateMotion dur="1.6s" begin="0s" rotate="auto" repeatCount="indefinite"><mpath href="#p1"/></animateMotion></path>
                <path class="tri" d="M-5,-4 L6,0 L-5,4 Z"><animateMotion dur="1.6s" begin="-0.5s" rotate="auto" repeatCount="indefinite"><mpath href="#p2"/></animateMotion></path>
                <path class="tri" d="M-5,-4 L6,0 L-5,4 Z"><animateMotion dur="1.4s" begin="-0.7s" rotate="auto" repeatCount="indefinite"><mpath href="#p3"/></animateMotion></path>
                <path class="tri-amber" d="M-5,-4 L6,0 L-5,4 Z"><animateMotion dur="1.4s" begin="-0.7s" rotate="auto" repeatCount="indefinite"><mpath href="#p4"/></animateMotion></path>
                <path class="tri" d="M-5,-4 L6,0 L-5,4 Z"><animateMotion dur="1.7s" begin="-0.9s" rotate="auto" repeatCount="indefinite"><mpath href="#p5"/></animateMotion></path>
                <path class="tri" d="M-5,-4 L6,0 L-5,4 Z"><animateMotion dur="2.0s" begin="-0.4s" rotate="auto" repeatCount="indefinite"><mpath href="#p6"/></animateMotion></path>
                <path class="tri" d="M-5,-4 L6,0 L-5,4 Z"><animateMotion dur="1.5s" begin="-0.6s" rotate="auto" repeatCount="indefinite"><mpath href="#p7"/></animateMotion></path>
                <path class="tri" d="M-5,-4 L6,0 L-5,4 Z"><animateMotion dur="1.5s" begin="-1.0s" rotate="auto" repeatCount="indefinite"><mpath href="#p8"/></animateMotion></path>
                <path class="tri" d="M-5,-4 L6,0 L-5,4 Z"><animateMotion dur="1.5s" begin="-1.3s" rotate="auto" repeatCount="indefinite"><mpath href="#p9"/></animateMotion></path>

                <!-- ===== nodes (spine, y 70..122) ===== -->
                <g class="gnode" style="animation-delay:0.0s"><rect x="8" y="70" width="150" height="52" rx="10" fill="rgba(126,186,66,0.10)" stroke="rgba(126,186,66,0.32)"/><text class="n-title" x="83" y="92" text-anchor="middle">Wniosek</text><text class="n-sub" x="83" y="109" text-anchor="middle">Forms / Power Apps</text></g>
                <g class="gnode" style="animation-delay:0.12s"><rect x="196" y="70" width="168" height="52" rx="10" fill="rgba(126,186,66,0.10)" stroke="rgba(126,186,66,0.32)"/><text class="n-title" x="280" y="92" text-anchor="middle">Brama API</text><text class="n-sub" x="280" y="109" text-anchor="middle">API Mgmt + Entra ID</text></g>
                <g class="gnode gnode--core" style="animation-delay:0.24s"><rect x="402" y="70" width="176" height="52" rx="10" fill="rgba(126,186,66,0.16)" stroke="rgba(126,186,66,0.45)"/><text class="n-title" x="490" y="92" text-anchor="middle">Rdzeń FastAPI</text><text class="n-sub" x="490" y="109" text-anchor="middle">Azure Functions</text></g>

                <!-- decision gate (static, no animation) -->
                <g style="animation:none"><polygon points="640,64 670,96 640,128 610,96" fill="#7eba42" stroke="#9ad94f" stroke-width="1.5"/><text class="gate-label" x="640" y="100" text-anchor="middle">1000 zł?</text></g>

                <g class="gnode" style="animation-delay:0.46s"><rect x="700" y="70" width="150" height="52" rx="10" fill="rgba(126,186,66,0.10)" stroke="rgba(126,186,66,0.32)"/><text class="n-title" x="775" y="92" text-anchor="middle">Service Bus</text><text class="n-sub" x="775" y="109" text-anchor="middle">topic + DLQ</text></g>
                <g class="gnode" style="animation-delay:0.58s"><rect x="888" y="70" width="176" height="52" rx="10" fill="rgba(126,186,66,0.10)" stroke="rgba(126,186,66,0.32)"/><text class="n-title" x="976" y="92" text-anchor="middle">Powiadomienie</text><text class="n-sub" x="976" y="109" text-anchor="middle">e-mail</text></g>

                <!-- decision branch captions -->
                <text class="edge-label" x="612" y="158" text-anchor="middle">&le;1000: auto / przełożony</text>
                <text class="edge-label" x="612" y="174" text-anchor="middle" fill="#f0b870">&gt;1000: Dyrektor Działu</text>

                <!-- row 2 (y 270..322) -->
                <g class="gnode gnode--core" style="animation-delay:0.5s"><rect x="415" y="270" width="150" height="52" rx="10" fill="rgba(126,186,66,0.16)" stroke="rgba(126,186,66,0.45)"/><text class="n-title" x="490" y="292" text-anchor="middle">Azure SQL</text><text class="n-sub" x="490" y="309" text-anchor="middle">model 3NF (OLTP)</text></g>
                <g class="gnode" style="animation-delay:0.62s"><rect x="605" y="270" width="150" height="52" rx="10" fill="rgba(170,140,40,0.20)" stroke="rgba(243,223,138,0.42)"/><text class="n-title" x="680" y="292" text-anchor="middle">Archiwum</text><text class="n-sub" x="680" y="309" text-anchor="middle" fill="#f3df8a">Blob WORM</text></g>
                <g class="gnode" style="animation-delay:0.74s"><rect x="795" y="270" width="150" height="52" rx="10" fill="rgba(126,186,66,0.10)" stroke="rgba(126,186,66,0.32)"/><text class="n-title" x="870" y="292" text-anchor="middle">Fabric</text><text class="n-sub" x="870" y="309" text-anchor="middle">fact_spend (star)</text></g>
                <g class="gnode" style="animation-delay:0.86s"><rect x="985" y="270" width="170" height="52" rx="10" fill="rgba(126,186,66,0.10)" stroke="rgba(126,186,66,0.32)"/><text class="n-title" x="1070" y="292" text-anchor="middle">Power BI</text><text class="n-sub" x="1070" y="309" text-anchor="middle">raporty wydatków</text></g>

                <!-- labels for tiers -->
                <text x="20" y="225" font-family="Montserrat, sans-serif" font-size="10" font-weight="700" letter-spacing="0.12em" fill="#6e7d9c">PLANE: PRZETWARZANIE OPERACYJNE (OLTP)</text>
                <text x="20" y="360" font-family="Montserrat, sans-serif" font-size="10" font-weight="700" letter-spacing="0.12em" fill="#6e7d9c">PLANE: TRWAŁOŚĆ · ARCHIWUM · ANALITYKA</text>
                <line x1="20" y1="232" x2="1160" y2="232" stroke="rgba(126,186,66,0.18)" stroke-dasharray="4 6"/>
            </svg>
        </div>

    </div>
    </div>
</div>
<div class="bottom-bar"></div>
</div>
</div></div></div>
<script src="slides-rwd.js" defer></script>
<script src="slides-nav.js" defer></script>
</body></html>
