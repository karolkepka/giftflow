<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Diagram przepływu danych (DFD — poziom 1)</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
<link href="theme.css" rel="stylesheet">
<style>
    .wrap { display: flex; flex-direction: column; gap: 10px; height: 100%; min-height: 0; }
    .dfd { flex: 1; min-height: 0; border-radius: 14px; padding: 6px 10px; background: var(--panel-bg); border: 1px solid var(--green-border); }
    .dfd svg { width: 100%; height: 100%; display: block; }
    .ext { transition: all 0.3s ease; }
    .ext:hover rect { fill: rgba(126,186,66,0.18); }
    .ext-t { font-family:'Inter',sans-serif; font-size: 11px; font-weight: 600; fill: #eef2f8; }
    .proc { transition: all 0.3s ease; }
    .proc:hover circle { fill: rgba(126,186,66,0.30); }
    .p-num { font-family:'Montserrat',sans-serif; font-size: 11px; font-weight: 800; fill: #9ad94f; }
    .p-name { font-family:'Inter',sans-serif; font-size: 10px; fill: #dfe7f2; }
    .ds-id { font-family:'Montserrat',sans-serif; font-size: 10px; font-weight: 700; fill: #16210a; }
    .ds-name { font-family:'JetBrains Mono',monospace; font-size: 9.5px; fill: #c9e7a6; }
    .arr { stroke: #7eba42; stroke-width: 1.7; fill: none; }
    .arr-amber { stroke: #f0b870; stroke-width: 1.7; fill: none; }
    .alabel { font-family:'JetBrains Mono',monospace; font-size: 9px; fill: #9fb0c9; }
    .legend-row { display: flex; align-items: center; justify-content: center; gap: 20px; flex-shrink: 0; font-size: 10.5px; color: var(--muted); }
    .legend-row b { color: #e2e8f0; }
    .lg { display: inline-flex; align-items: center; gap: 6px; }
    .gly { width: 26px; height: 16px; display: inline-flex; align-items: center; justify-content: center; }
</style>
<link href="slides-rwd.css" rel="stylesheet">
</head>
<body>
<div class="slide-viewport"><div class="slide-scale-wrap"><div class="slide-scale-inner">
<div class="slide-container">
<div class="stage">
    <div class="s-header">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-share-nodes"></i></div>
            <div>
                <div class="case-label">Dział: Procesy &amp; przepływy · 1/2</div>
                <div class="logo-text">Diagram przepływu danych (DFD — poziom 1)</div>
                <div class="logo-subtitle">Encje zewnętrzne · procesy · magazyny danych — notacja Yourdon/DeMarco</div>
            </div>
        </div>
        <div class="header-right">
            <span class="section-pill">11 / 18</span>
            <span class="status-badge"><i class="fas fa-circle-nodes"></i> Level 1</span>
            <div class="brand-chip"><span class="brand-mark"><i class="fas fa-gift"></i></span><span class="brand-word">Gift<span>Flow</span></span></div>
        </div>
    </div>

    <div class="s-body">
    <div class="wrap">
        <div class="dfd">
            <svg viewBox="0 0 1200 430" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img">
                <title>DFD poziom 1 — workflow zakupu prezentów i nagród</title>
                <defs>
                    <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#7eba42"/></marker>
                    <marker id="aa" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#f0b870"/></marker>
                </defs>

                <!-- ===== flows ===== -->
                <path class="arr" d="M170,86 H246" marker-end="url(#a)"/>
                <path class="arr" d="M332,86 H476" marker-end="url(#a)"/>
                <path class="arr" d="M280,128 L470,160" marker-end="url(#a)"/>
                <path class="arr" d="M520,132 V206" marker-end="url(#a)"/>
                <path class="arr-amber" d="M178,316 L482,268" marker-end="url(#aa)"/>
                <path class="arr" d="M556,222 L648,190" marker-end="url(#a)"/>
                <path class="arr" d="M478,250 H334" marker-end="url(#a)"/>
                <path class="arr" d="M268,212 L150,120" marker-end="url(#a)"/>
                <path class="arr" d="M562,250 H716" marker-end="url(#a)"/>
                <path class="arr" d="M760,292 L788,348" marker-end="url(#a)"/>
                <path class="arr" d="M802,250 H942" marker-end="url(#a)"/>
                <path class="arr" d="M985,292 L1000,348" marker-end="url(#a)"/>
                <path class="arr" d="M1000,208 L1075,120" marker-end="url(#a)"/>

                <!-- flow labels -->
                <text class="alabel" x="186" y="78">zgłoszenie</text>
                <text class="alabel" x="372" y="78">wniosek</text>
                <text class="alabel" x="528" y="178">próg</text>
                <text class="alabel" x="300" y="350" fill="#f0b870">akceptacja &gt;1000</text>
                <text class="alabel" x="600" y="184">decyzja+log</text>
                <text class="alabel" x="360" y="242">wynik</text>
                <text class="alabel" x="150" y="150">feedback</text>
                <text class="alabel" x="628" y="242">do archiwum</text>
                <text class="alabel" x="1024" y="160">raport</text>

                <!-- ===== external entities ===== -->
                <g class="ext"><rect x="20" y="60" width="150" height="52" rx="4" fill="rgba(255,255,255,0.05)" stroke="#7eba42" stroke-width="1.4"/><text class="ext-t" x="95" y="83" text-anchor="middle">Pracownik</text><text class="ext-t" x="95" y="99" text-anchor="middle" font-size="9" fill="#9fb0c9">(wnioskujący)</text></g>
                <g class="ext"><rect x="20" y="296" width="160" height="52" rx="4" fill="rgba(240,184,112,0.08)" stroke="#f0b870" stroke-width="1.4"/><text class="ext-t" x="100" y="319" text-anchor="middle">Dyrektor /</text><text class="ext-t" x="100" y="335" text-anchor="middle">Przełożony</text></g>
                <g class="ext"><rect x="1030" y="58" width="152" height="54" rx="4" fill="rgba(255,255,255,0.05)" stroke="#7eba42" stroke-width="1.4"/><text class="ext-t" x="1106" y="81" text-anchor="middle">Kontroling /</text><text class="ext-t" x="1106" y="97" text-anchor="middle">Analityk</text></g>

                <!-- ===== processes ===== -->
                <g class="proc"><circle cx="290" cy="86" r="44" fill="rgba(126,186,66,0.12)" stroke="#7eba42" stroke-width="1.4"/><text class="p-num" x="290" y="78" text-anchor="middle">1.0</text><text class="p-name" x="290" y="93" text-anchor="middle">Rejestracja</text><text class="p-name" x="290" y="105" text-anchor="middle">wniosku</text></g>
                <g class="proc"><circle cx="520" cy="86" r="44" fill="rgba(126,186,66,0.12)" stroke="#7eba42" stroke-width="1.4"/><text class="p-num" x="520" y="78" text-anchor="middle">2.0</text><text class="p-name" x="520" y="93" text-anchor="middle">Weryfikacja</text><text class="p-name" x="520" y="105" text-anchor="middle">1000 PLN</text></g>
                <g class="proc"><circle cx="520" cy="250" r="44" fill="rgba(126,186,66,0.16)" stroke="#9ad94f" stroke-width="1.6"/><text class="p-num" x="520" y="242" text-anchor="middle">3.0</text><text class="p-name" x="520" y="257" text-anchor="middle">Decyzja</text><text class="p-name" x="520" y="269" text-anchor="middle">akceptacji</text></g>
                <g class="proc"><circle cx="290" cy="250" r="44" fill="rgba(126,186,66,0.12)" stroke="#7eba42" stroke-width="1.4"/><text class="p-num" x="290" y="242" text-anchor="middle">4.0</text><text class="p-name" x="290" y="257" text-anchor="middle">Powiado-</text><text class="p-name" x="290" y="269" text-anchor="middle">mienie</text></g>
                <g class="proc"><circle cx="760" cy="250" r="44" fill="rgba(126,186,66,0.12)" stroke="#7eba42" stroke-width="1.4"/><text class="p-num" x="760" y="242" text-anchor="middle">5.0</text><text class="p-name" x="760" y="257" text-anchor="middle">Archiwi-</text><text class="p-name" x="760" y="269" text-anchor="middle">zacja</text></g>
                <g class="proc"><circle cx="985" cy="250" r="44" fill="rgba(126,186,66,0.12)" stroke="#7eba42" stroke-width="1.4"/><text class="p-num" x="985" y="242" text-anchor="middle">6.0</text><text class="p-name" x="985" y="257" text-anchor="middle">Raporto-</text><text class="p-name" x="985" y="269" text-anchor="middle">wanie</text></g>

                <!-- ===== data stores (open rectangles with id cell) ===== -->
                <g class="ext"><rect x="410" y="158" width="200" height="34" fill="rgba(255,255,255,0.04)" stroke="#7eba42" stroke-width="1.2"/><rect x="410" y="158" width="34" height="34" fill="#7eba42"/><text class="ds-id" x="427" y="179" text-anchor="middle">D1</text><text class="ds-name" x="452" y="179">Wnioski (SQL 3NF)</text></g>
                <g class="ext"><rect x="640" y="150" width="195" height="34" fill="rgba(255,255,255,0.04)" stroke="#7eba42" stroke-width="1.2"/><rect x="640" y="150" width="34" height="34" fill="#7eba42"/><text class="ds-id" x="657" y="171" text-anchor="middle">D2</text><text class="ds-name" x="682" y="171">Decyzje &amp; audyt</text></g>
                <g class="ext"><rect x="690" y="350" width="200" height="34" fill="rgba(170,140,40,0.16)" stroke="#f3df8a" stroke-width="1.2"/><rect x="690" y="350" width="34" height="34" fill="#f3df8a"/><text class="ds-id" x="707" y="371" text-anchor="middle">D3</text><text class="ds-name" x="732" y="371" fill="#f3df8a">Archiwum (WORM)</text></g>
                <g class="ext"><rect x="910" y="350" width="200" height="34" fill="rgba(255,255,255,0.04)" stroke="#7eba42" stroke-width="1.2"/><rect x="910" y="350" width="34" height="34" fill="#7eba42"/><text class="ds-id" x="927" y="371" text-anchor="middle">D4</text><text class="ds-name" x="952" y="371">Hurtownia (Fabric)</text></g>
            </svg>
        </div>

        <div class="legend-row">
            <span class="lg"><span class="gly"><svg width="22" height="14"><rect x="1" y="1" width="20" height="12" rx="3" fill="none" stroke="#7eba42" stroke-width="1.4"/></svg></span> <b>Encja zewnętrzna</b></span>
            <span class="lg"><span class="gly"><svg width="18" height="16"><circle cx="9" cy="8" r="7" fill="none" stroke="#7eba42" stroke-width="1.4"/></svg></span> <b>Proces</b></span>
            <span class="lg"><span class="gly"><svg width="26" height="14"><rect x="1" y="3" width="24" height="9" fill="none" stroke="#7eba42" stroke-width="1.2"/><rect x="1" y="3" width="7" height="9" fill="#7eba42"/></svg></span> <b>Magazyn danych</b></span>
            <span class="lg"><i class="fas fa-arrow-right-long" style="color:#f0b870"></i> <b>ścieżka eskalacji</b> (&gt;1000 PLN)</span>
        </div>
    </div>
    </div>
</div>
<div class="bottom-bar"></div>
</div>
</div></div></div>
<script src="slides-rwd.js" defer></script>
<script src="slides-nav.js" defer></script>
</body></html>
